version: '3.8'

services:
  opinion_analysis:
    image: opinion-analysis:develop
    container_name: opinion-analysis-opinion_analysis
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    volumes:
      - ./opinion_analysis:/app
    command: streamlit run main.py 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/"]
      interval: 30s
      timeout: 10s
      retries: 5

